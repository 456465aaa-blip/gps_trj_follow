<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Absolute Snap Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@turf/turf/turf.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; overflow: hidden; background: #f0f0f0; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        #controls {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(255, 255, 255, 0.98);
            padding: 15px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            text-align: center; width: 280px; border: 1px solid #ddd;
        }
        #speed-panel { font-size: 36px; font-weight: 900; color: #000; margin-bottom: 5px; letter-spacing: -1px; }
        
        #gps-status-container {
            display: flex; align-items: center; justify-content: center;
            gap: 8px; margin-bottom: 12px; font-size: 14px; font-weight: 700;
        }
        #gps-dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; }
        .status-good { background: #00c853 !important; box-shadow: 0 0 10px #00c853; }
        .status-normal { background: #ffab00 !important; box-shadow: 0 0 10px #ffab00; }
        .status-bad { background: #ff1744 !important; box-shadow: 0 0 10px #ff1744; }

        input[type="file"] { width: 100%; font-size: 12px; color: #666; }

        #locate-btn {
            position: absolute; bottom: 40px; right: 20px; z-index: 1000;
            background: white; border: none; border-radius: 50px;
            padding: 16px 24px; font-size: 16px; font-weight: 800; color: #4285F4;
            cursor: pointer; box-shadow: 0 6px 20px rgba(0,0,0,0.25);
            display: flex; align-items: center; gap: 8px;
        }
        .active-follow { background: #4285F4 !important; color: white !important; }
        
        .arrow-container { transition: transform 0.2s linear; }
    </style>
</head>
<body>

    <div id="controls">
        <div id="speed-panel">0.0 km/h</div>
        <div id="gps-status-container">
            <div id="gps-dot"></div>
            <span id="gps-text">신호 수신 대기 중...</span>
        </div>
        <input type="file" id="geojson-input" accept=".geojson, .json">
    </div>

    <button id="locate-btn" class="active-follow">🎯 실시간 추적 중</button>
    <div id="map"></div>

    <script>
        const map = L.map('map', { 
            zoomControl: false, 
            tap: false,
            wheelDebounceTime: 0
        }).setView([37.5665, 126.9780], 17);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        L.control.zoom({ position: 'topright' }).addTo(map);

        let currentRouteGeoJSON = null; 
        let routeSegments = []; 
        let baseRouteLayer = null;       
        let passedPolyline = null;       
        let userMarker = null;           
        let trackingWatchId = null;      
        let passedPathCoordinates = [];  
        let isAutoFollowing = true; 
        let lastHeading = null; // [수정됨] 초기값을 0이 아닌 null로 설정하여 오작동 방지

        let targetLat = null;         
        let targetLng = null;         
        let currentDisplayLat = null; 
        let currentDisplayLng = null; 

        const gpsDot = document.getElementById('gps-dot');
        const gpsText = document.getElementById('gps-text');
        const speedPanel = document.getElementById('speed-panel');
        const locateBtn = document.getElementById('locate-btn');

        map.on('dragstart', () => {
            isAutoFollowing = false;
            locateBtn.classList.remove('active-follow');
            locateBtn.innerText = "📍 수동 탐색 모드";
        });

        locateBtn.addEventListener('click', function() {
            requestCompassPermission(); 
            isAutoFollowing = true;
            this.classList.add('active-follow');
            this.innerText = "🎯 실시간 추적 중";
            if (targetLat !== null && targetLng !== null) {
                map.setView([targetLat, targetLng], map.getZoom(), { animate: true });
            }
        });

        document.getElementById('geojson-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (baseRouteLayer) map.removeLayer(baseRouteLayer);
                    if (passedPolyline) map.removeLayer(passedPolyline);
                    processGeoJSON(data);
                } catch (err) { alert('GeoJSON 파일 오류'); }
            };
            reader.readAsText(file);
        });

        function getSegmentHeadingDiff(heading1, heading2) {
            let diff = Math.abs(heading1 - heading2) % 360;
            if (diff > 180) diff = 360 - diff;
            return diff;
        }

        function processGeoJSON(data) {
            currentRouteGeoJSON = data;
            passedPathCoordinates = []; 
            routeSegments = [];
            
            // [수정됨] 복잡한 GeoJSON 파일에서 선분을 확실하게 쪼개어 담기
            try {
                turf.segmentEach(data, (currentSegment) => {
                    routeSegments.push(currentSegment);
                });
            } catch(e) { console.error("GeoJSON 선분화 오류:", e); }

            baseRouteLayer = L.geoJSON(data, { style: { color: '#FF0000', weight: 4, opacity: 1.0 } }).addTo(map);
            map.fitBounds(baseRouteLayer.getBounds());
            
            passedPolyline = L.polyline([], { 
                color: '#333', weight: 14, opacity: 0.85, lineJoin: 'round', lineCap: 'round' 
            }).addTo(map);
        }

        function handleOrientation(event) {
            let heading = event.webkitCompassHeading || (360 - event.alpha);
            if (heading) {
                lastHeading = heading;
                if (userMarker) {
                    const arrowIcon = L.divIcon({
                        className: 'custom-arrow',
                        html: getArrowHTML(lastHeading),
                        iconSize: [32, 32],
                        iconAnchor: [16, 16] 
                    });
                    userMarker.setIcon(arrowIcon);
                }
            }
        }

        function requestCompassPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(response => {
                        if (response == 'granted') window.addEventListener('deviceorientation', handleOrientation);
                    }).catch(console.error);
            } else {
                window.addEventListener('deviceorientationabsolute', handleOrientation, true);
            }
        }

        function updateGPSStatus(accuracy) {
            gpsDot.className = "";
            if (accuracy < 15) {
                gpsDot.classList.add('status-good');
                gpsText.innerText = `GPS 양호 (${accuracy.toFixed(1)}m)`;
                gpsText.style.color = "#00c853";
            } else if (accuracy < 40) {
                gpsDot.classList.add('status-normal');
                gpsText.innerText = `GPS 보통 (${accuracy.toFixed(1)}m)`;
                gpsText.style.color = "#ffab00";
            } else {
                gpsDot.classList.add('status-bad');
                gpsText.innerText = `GPS 불량 (${accuracy.toFixed(1)}m)`;
                gpsText.style.color = "#ff1744";
            }
        }

        function getArrowHTML(heading) {
            const displayHeading = heading || 0; // heading이 null일 때 기본값 처리
            return `
                <div class="arrow-container" style="width: 32px; height: 32px; transform: rotate(${displayHeading}deg); transform-origin: center center;">
                    <svg viewBox="0 0 100 100" style="width: 100%; height: 100%; filter: drop-shadow(0px 2px 3px rgba(0,0,0,0.4));">
                        <polygon points="50,10 90,90 50,70 10,90" fill="#4285F4" stroke="white" stroke-width="4"/>
                    </svg>
                </div>
            `;
        }

        function smoothAnimate() {
            if (targetLat !== null && targetLng !== null && userMarker) {
                if (currentDisplayLat === null) {
                    currentDisplayLat = targetLat;
                    currentDisplayLng = targetLng;
                }
                const easing = 0.1;
                currentDisplayLat += (targetLat - currentDisplayLat) * easing;
                currentDisplayLng += (targetLng - currentDisplayLng) * easing;
                userMarker.setLatLng([currentDisplayLat, currentDisplayLng]);
            }
            requestAnimationFrame(smoothAnimate); 
        }

        function startTracking() {
            if (!navigator.geolocation) return;
            
            trackingWatchId = navigator.geolocation.watchPosition((pos) => {
                const { latitude: lat, longitude: lng, speed, accuracy, heading } = pos.coords;
                
                updateGPSStatus(accuracy);
                const kmh = ((speed || 0) * 3.6).toFixed(1);
                speedPanel.innerText = `${kmh} km/h`;

                if (heading !== null && !isNaN(heading) && speed > 0.5) {
                    lastHeading = heading;
                }

                let finalLat = lat;
                let finalLng = lng;

                // [수정됨] 완벽한 절대 스냅(Absolute Snap) 로직
                if (routeSegments.length > 0) {
                    try {
                        const userPoint = turf.point([lng, lat]);
                        const snapThreshold = Math.max(50, accuracy * 1.5); 
                        
                        let bestSegment = null;
                        let minDistWithHeading = Infinity;
                        let minDistWithoutHeading = Infinity;
                        let bestSegmentWithoutHeading = null;

                        // 1. 모든 선분을 뒤져서 가장 가까운 도로들을 찾습니다.
                        for (const segment of routeSegments) {
                            const distToSegment = turf.pointToLineDistance(userPoint, segment, {units: 'meters'});
                            
                            // 내 반경(50m 등) 안에 도로가 있다면
                            if (distToSegment <= snapThreshold) {
                                // 방향 상관없이 일단 제일 가까운 도로를 저장 (보험용)
                                if (distToSegment < minDistWithoutHeading) {
                                    minDistWithoutHeading = distToSegment;
                                    bestSegmentWithoutHeading = segment;
                                }

                                // 방향(Heading) 데이터가 유효하다면 상하행 보정 평가
                                if (lastHeading !== null) {
                                    const p1 = segment.geometry.coordinates[0];
                                    const p2 = segment.geometry.coordinates[1];
                                    const segmentBearing = turf.bearing(p1, p2);
                                    let segmentHeading = segmentBearing < 0 ? segmentBearing + 360 : segmentBearing;
                                    const headingDiff = getSegmentHeadingDiff(lastHeading, segmentHeading);
                                    
                                    // 90도 이내로 올바르게 달리고 있는 도로 중 가장 가까운 것 찾기
                                    if (headingDiff <= 90 && distToSegment < minDistWithHeading) {
                                        minDistWithHeading = distToSegment;
                                        bestSegment = segment;
                                    }
                                }
                            }
                        }

                        // 2. 최종 스냅 도로 결정 (방향이 맞는게 우선, 없으면 무조건 젤 가까운 곳)
                        let targetSegment = bestSegment || bestSegmentWithoutHeading;

                        if (targetSegment) {
                            const snapped = turf.nearestPointOnLine(targetSegment, userPoint);
                            finalLat = snapped.geometry.coordinates[1];
                            finalLng = snapped.geometry.coordinates[0];

                            // 회색 궤적 추가
                            if (passedPathCoordinates.length === 0 || 
                                L.latLng(finalLat, finalLng).distanceTo(L.latLng(passedPathCoordinates[passedPathCoordinates.length-1])) > 1) {
                                passedPathCoordinates.push([finalLat, finalLng]);
                                passedPolyline.setLatLngs(passedPathCoordinates);
                            }
                        }
                    } catch (e) { console.error("스냅 연산 오류:", e); }
                }

                targetLat = finalLat;
                targetLng = finalLng;

                const arrowIcon = L.divIcon({
                    className: 'custom-arrow',
                    html: getArrowHTML(lastHeading),
                    iconSize: [32, 32],
                    iconAnchor: [16, 16] 
                });

                if (!userMarker) {
                    currentDisplayLat = targetLat;
                    currentDisplayLng = targetLng;
                    userMarker = L.marker([targetLat, targetLng], { icon: arrowIcon }).addTo(map);
                    requestAnimationFrame(smoothAnimate);
                } else {
                    userMarker.setIcon(arrowIcon); 
                }

                if (isAutoFollowing) {
                    map.panTo([targetLat, targetLng], { animate: true, duration: 1.0, easeLinearity: 1 });
                }

            }, (err) => {
                gpsText.innerText = "GPS 신호 끊김";
                gpsDot.className = "status-bad";
            }, { 
                enableHighAccuracy: true, 
                maximumAge: 0, 
                timeout: 5000 
            });
        }

        window.onload = startTracking;
    </script>
</body>
</html>
