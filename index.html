<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Ultimate Kakao Tracker (Dynamic Pin & Progress)</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=34bd25e1ff5410300affbf08cb002b43"></script>
    <script src="https://unpkg.com/@turf/turf/turf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/togeojson/0.16.0/togeojson.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; overflow: hidden; background: #f0f0f0; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        #controls {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(5px);
            padding: 15px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            text-align: center; width: 280px; border: 1px solid #ddd;
        }
        #speed-panel { font-size: 36px; font-weight: 900; color: #000; margin-bottom: 5px; letter-spacing: -1px; }
        #gps-status-container { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px; font-size: 14px; font-weight: 700; }
        #gps-dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; }
        .status-good { background: #00c853 !important; box-shadow: 0 0 10px #00c853; }
        .status-normal { background: #ffab00 !important; box-shadow: 0 0 10px #ffab00; }
        .status-bad { background: #ff1744 !important; box-shadow: 0 0 10px #ff1744; }
        input[type="file"] { width: 100%; font-size: 12px; color: #666; }

        /* [수정] 진행률 바 UI (ETA 제거 및 중앙 정렬) */
        #progress-container { margin-top: 10px; width: 100%; text-align: center; }
        #progress-text { font-size: 13px; font-weight: 800; color: #333; margin-bottom: 6px; }
        #progress-bar-bg { width: 100%; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
        #progress-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #4285F4, #34C759); transition: width 0.3s; }
        
        #layer-control {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); padding: 10px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); border: 1px solid #ddd;
            max-width: 150px; display: flex; flex-direction: column; gap: 8px;
        }
        .layer-title { font-size: 12px; font-weight: 800; color: #333; margin-bottom: 2px; }
        .layer-item { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; color: #555; word-break: break-all; }
        .layer-color-box { width: 12px; height: 12px; border-radius: 3px; }

        /* [수정] 다이내믹 핀 마커 및 툴팁 UI */
        #pin-btn {
            position: absolute; bottom: 40px; left: 20px; z-index: 1000;
            background: white; border: none; border-radius: 50px;
            padding: 16px; font-size: 16px; font-weight: 800; color: #FF9500;
            cursor: pointer; box-shadow: 0 6px 20px rgba(0,0,0,0.25);
            display: flex; align-items: center; justify-content: center; width: 50px; height: 50px;
        }
        
        .pin-container {
            position: relative;
            cursor: pointer;
            padding-bottom: 5px;
            /* 💡 스케일링을 위해 기준점을 하단 중앙으로 고정 */
            transform-origin: bottom center; 
            transition: transform 0.2s ease;
        }
        
        .pin-icon {
            width: 28px;
            height: 28px;
            background: white;
            border: 2px solid #FF9500;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
            position: relative;
            z-index: 2;
        }

        .pin-tooltip {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border: 2px solid #FF9500;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 800;
            color: #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            /* 💡 텍스트가 길어지면 자동으로 줄바꿈 되도록 가변 사이즈 설정 */
            white-space: pre-wrap; 
            word-break: keep-all;
            max-width: 200px;
            width: max-content;
            text-align: center;
            z-index: 1;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease-in-out;
        }

        .pin-tooltip::after {
            content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
            border-width: 6px 5px 0; border-style: solid; border-color: #FF9500 transparent transparent transparent;
        }

        .pin-tooltip.show {
            opacity: 1;
            visibility: visible;
            bottom: 45px; 
        }

        #locate-btn {
            position: absolute; bottom: 40px; right: 20px; z-index: 1000;
            background: white; border: none; border-radius: 50px;
            padding: 16px 24px; font-size: 16px; font-weight: 800; color: #4285F4;
            cursor: pointer; box-shadow: 0 6px 20px rgba(0,0,0,0.25);
            display: flex; align-items: center; gap: 8px; transition: all 0.3s ease;
        }
        .active-follow { background: #4285F4 !important; color: white !important; }

        #off-route-warning {
            position: absolute; top: 160px; left: 50%; transform: translateX(-50%);
            background: #ff1744; color: white; padding: 12px 24px; border-radius: 30px;
            font-weight: 900; font-size: 16px; z-index: 1000; box-shadow: 0 4px 15px rgba(255,23,68,0.5);
            display: none; animation: blink 0.8s infinite alternate; letter-spacing: -0.5px;
        }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="layer-control" style="display: none;">
        <div class="layer-title">🗺️ 레이어 목록</div>
        <div id="layer-list"></div>
    </div>

    <div id="controls">
        <div id="speed-panel">0.0 km/h</div>
        <div id="gps-status-container">
            <div id="gps-dot"></div>
            <span id="gps-text">위치 정보 수신 대기 중...</span>
        </div>
        <input type="file" id="geojson-input" accept=".geojson, .json, .gpx, .kml" multiple title="여러 파일을 선택할 수 있습니다">
        
        <div id="progress-container">
            <div id="progress-text">
                <span id="progress-percent">현재 진행률 0%</span>
            </div>
            <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
        </div>
    </div>

    <div id="off-route-warning">🚨 경로 이탈 주의!</div>

    <button id="pin-btn" title="현장 이슈 기록">📌</button>
    <button id="locate-btn" class="active-follow">🎯 실시간 추적 중</button>
    <div id="map"></div>

    <script>
        const container = document.getElementById('map');
        const options = { center: new kakao.maps.LatLng(37.5665, 126.9780), level: 3 };
        const map = new kakao.maps.Map(container, options);

        let loadedRoutes = []; 
        let savedPins = [];    
        const routeColors = ['#FF3B30', '#007AFF', '#34C759', '#FF9500', '#AF52DE']; 
        
        let passedPolyline = null;       
        let userMarker = null;           
        let passedPathCoordinates = [];  
        
        let totalRouteLengthMeters = 0;
        let totalPassedLengthMeters = 0;
        
        let isAutoFollowing = true; 
        let autoReturnTimer = null;

        let lastHeading = null; 
        let targetLat = null, targetLng = null;
        let currentDisplayLat = null, currentDisplayLng = null;
        let movementBearing = null;
        let prevFinalLat = null, prevFinalLng = null;
        
        let lastValidPos = null;
        let lastValidTime = 0;
        let currentSpeedMs = 0; 
        let lastGpsTime = 0;    
        let lastPathTime = 0; 
        
        let wakeLock = null; 

        const gpsDot = document.getElementById('gps-dot');
        const gpsText = document.getElementById('gps-text');
        const speedPanel = document.getElementById('speed-panel');
        const locateBtn = document.getElementById('locate-btn');
        const offRouteWarning = document.getElementById('off-route-warning');
        
        const layerControl = document.getElementById('layer-control');
        const layerList = document.getElementById('layer-list');
        const progressPercent = document.getElementById('progress-percent');
        const progressBarFill = document.getElementById('progress-bar-fill');

        function saveToLocalStorage() {
            try {
                const routesToSave = loadedRoutes.map(r => ({ id: r.id, name: r.name, color: r.color, visible: r.visible, data: r.data }));
                localStorage.setItem('savedMultiRoutes', JSON.stringify(routesToSave));
                
                if (passedPathCoordinates.length > 0) {
                    const pathArray = passedPathCoordinates.map(coord => ({ lat: coord.getLat(), lng: coord.getLng() }));
                    localStorage.setItem('savedTrajectory', JSON.stringify(pathArray));
                }
                localStorage.setItem('savedPins', JSON.stringify(savedPins.map(p => ({ lat: p.lat, lng: p.lng, memo: p.memo }))));
            } catch(e) {}
        }

        function loadFromLocalStorage() {
            try {
                const savedRoutesStr = localStorage.getItem('savedMultiRoutes');
                if (savedRoutesStr && JSON.parse(savedRoutesStr).length > 0) {
                    if (confirm('🚨 이전 작업 기록이 남아있습니다.\n중단된 시점부터 이어서 진행하시겠습니까?')) {
                        const parsedRoutes = JSON.parse(savedRoutesStr);
                        parsedRoutes.forEach(route => addRouteToMap(route.data, route.name, route.color, route.visible));

                        const savedTrajectoryStr = localStorage.getItem('savedTrajectory');
                        if (savedTrajectoryStr) {
                            const parsedTrajectory = JSON.parse(savedTrajectoryStr);
                            passedPathCoordinates = parsedTrajectory.map(pt => new kakao.maps.LatLng(pt.lat, pt.lng));
                            if (!passedPolyline) initPassedPolyline();
                            passedPolyline.setPath(passedPathCoordinates);
                            if (passedPathCoordinates.length > 0) lastPathTime = Date.now();
                            recalculatePassedDistance();
                        }
                        
                        const savedPinsStr = localStorage.getItem('savedPins');
                        if (savedPinsStr) {
                            const parsedPins = JSON.parse(savedPinsStr);
                            parsedPins.forEach(p => createPinOverlay(p.lat, p.lng, p.memo, false));
                        }
                    } else {
                        localStorage.clear();
                    }
                }
            } catch(e) {}
        }

        document.getElementById('pin-btn').addEventListener('click', () => {
            if (targetLat === null || targetLng === null) {
                alert("GPS 위치를 수신 중입니다. 잠시 후 다시 시도해주세요."); return;
            }
            const memo = prompt("현장 특이사항을 입력하세요:", "");
            if (memo) {
                createPinOverlay(targetLat, targetLng, memo, true);
                saveToLocalStorage();
            }
        });

        function createPinOverlay(lat, lng, memo, isNew) {
            const container = document.createElement('div');
            container.className = 'pin-container';

            const icon = document.createElement('div');
            icon.className = 'pin-icon';
            icon.innerText = '📍';

            const tooltip = document.createElement('div');
            tooltip.className = 'pin-tooltip';
            tooltip.innerText = memo;

            icon.addEventListener('click', () => {
                tooltip.classList.toggle('show');
            });

            container.appendChild(icon);
            container.appendChild(tooltip);

            const customOverlay = new kakao.maps.CustomOverlay({
                position: new kakao.maps.LatLng(lat, lng), 
                content: container, 
                yAnchor: 1 
            });
            customOverlay.setMap(map);
            
            if (isNew) savedPins.push({ lat, lng, memo });
            
            updatePinScale(); // 핀 생성 직후 현재 줌 레벨에 맞춰 사이즈 조절
        }

        document.getElementById('geojson-input').addEventListener('change', function(e) {
            const files = e.target.files;
            if (files.length === 0) return;
            
            Array.from(files).forEach(file => {
                const ext = file.name.split('.').pop().toLowerCase();
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        let geojsonData = null;
                        if (ext === 'json' || ext === 'geojson') geojsonData = JSON.parse(event.target.result);
                        else if (ext === 'kml' || ext === 'gpx') {
                            const dom = new DOMParser().parseFromString(event.target.result, 'text/xml');
                            geojsonData = ext === 'kml' ? toGeoJSON.kml(dom) : toGeoJSON.gpx(dom);
                        }
                        if (geojsonData) {
                            const color = routeColors[loadedRoutes.length % routeColors.length];
                            addRouteToMap(geojsonData, file.name, color, true);
                            saveToLocalStorage();
                        }
                    } catch (err) { alert(`${file.name} 변환 오류`); }
                };
                reader.readAsText(file);
            });
        });

        function addRouteToMap(geojsonData, name, color, visible) {
            let kakaoPaths = []; let segments = []; let length = 0; let bounds = new kakao.maps.LatLngBounds();
            try {
                let segmentId = 0;
                turf.segmentEach(geojsonData, (currentSegment) => {
                    currentSegment.segmentId = `route_${loadedRoutes.length}_${segmentId++}`;
                    segments.push(currentSegment);
                });
                turf.coordEach(geojsonData, (c) => {
                    const latLng = new kakao.maps.LatLng(c[1], c[0]);
                    kakaoPaths.push(latLng); bounds.extend(latLng);
                });
                length = turf.length(geojsonData, {units: 'meters'});
            } catch(e) {}

            const polyline = new kakao.maps.Polyline({
                path: kakaoPaths, strokeWeight: getDynamicWeight(), strokeColor: color, strokeOpacity: 0.6, strokeStyle: 'solid'
            });
            if (visible) polyline.setMap(map);

            const routeId = `route_${Date.now()}_${Math.floor(Math.random()*1000)}`;
            loadedRoutes.push({ id: routeId, name, color, visible, data: geojsonData, polyline, segments, length });
            
            if (visible && kakaoPaths.length > 0) map.setBounds(bounds);
            if (!passedPolyline) initPassedPolyline();
            
            updateLayerUI();
            updateTotalRouteLength();
        }

        function updateLayerUI() {
            if (loadedRoutes.length === 0) { layerControl.style.display = 'none'; return; }
            layerControl.style.display = 'flex';
            layerList.innerHTML = '';
            
            loadedRoutes.forEach(route => {
                const item = document.createElement('div');
                item.className = 'layer-item';
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox'; checkbox.checked = route.visible;
                checkbox.onchange = () => toggleRouteVisibility(route.id, checkbox.checked);
                
                const colorBox = document.createElement('div');
                colorBox.className = 'layer-color-box'; colorBox.style.background = route.color;
                
                const nameSpan = document.createElement('span');
                nameSpan.innerText = route.name.length > 10 ? route.name.substring(0,10) + '...' : route.name;
                
                item.appendChild(checkbox); item.appendChild(colorBox); item.appendChild(nameSpan);
                layerList.appendChild(item);
            });
        }

        function toggleRouteVisibility(routeId, isVisible) {
            const route = loadedRoutes.find(r => r.id === routeId);
            if (route) {
                route.visible = isVisible;
                if (isVisible) route.polyline.setMap(map);
                else route.polyline.setMap(null);
                updateTotalRouteLength();
                saveToLocalStorage();
            }
        }

        function initPassedPolyline() {
            passedPolyline = new kakao.maps.Polyline({ path: [], strokeWeight: getDynamicWeight(), strokeColor: '#8E8E93', strokeOpacity: 1.0, strokeStyle: 'solid' });
            passedPolyline.setMap(map);
        }

        function updateTotalRouteLength() {
            totalRouteLengthMeters = loadedRoutes.filter(r => r.visible).reduce((sum, r) => sum + r.length, 0);
            updateProgressUI();
        }

        function recalculatePassedDistance() {
            totalPassedLengthMeters = 0;
            if (passedPathCoordinates.length < 2) return;
            for (let i = 1; i < passedPathCoordinates.length; i++) {
                const p1 = passedPathCoordinates[i-1]; const p2 = passedPathCoordinates[i];
                totalPassedLengthMeters += turf.distance(turf.point([p1.getLng(), p1.getLat()]), turf.point([p2.getLng(), p2.getLat()]), {units: 'meters'});
            }
        }

        function updateProgressUI() {
            if (totalRouteLengthMeters <= 0) {
                progressPercent.innerText = "경로 대기중 (진행률 0%)";
                progressBarFill.style.width = "0%"; return;
            }
            
            let percent = (totalPassedLengthMeters / totalRouteLengthMeters) * 100;
            if (percent > 100) percent = 100;
            
            progressPercent.innerText = `현재 진행률 ${percent.toFixed(1)}%`;
            progressBarFill.style.width = `${percent}%`;
        }

        async function requestWakeLock() { if ('wakeLock' in navigator) try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {} }
        document.addEventListener('visibilitychange', async () => { if (wakeLock !== null && document.visibilityState === 'visible') requestWakeLock(); });

        function getDynamicWeight() {
            const level = map.getLevel();
            if (level <= 1) return 16; if (level === 2) return 12; if (level === 3) return 8; if (level === 4) return 5; return 3;
        }

        function updateLineWeight() {
            const w = getDynamicWeight();
            loadedRoutes.forEach(r => r.polyline.setOptions({ strokeWeight: w }));
            if (passedPolyline) passedPolyline.setOptions({ strokeWeight: w });
        }

        // 💡 [신규] 지도를 축소/확대할 때마다 핀 사이즈를 동적으로 조절하는 함수
        function updatePinScale() {
            const level = map.getLevel();
            let scale = 1;
            
            // 줌 레벨에 따른 스케일링 설정
            if (level <= 1) scale = 1.2;
            else if (level === 2) scale = 1.0;
            else if (level === 3) scale = 0.85;
            else if (level === 4) scale = 0.7;
            else scale = 0.55; // 지도를 넓게 볼 때는 작게 줄임

            const pins = document.querySelectorAll('.pin-container');
            pins.forEach(pin => {
                pin.style.transform = `scale(${scale})`;
            });
        }

        function startAutoReturnTimer() {
            if (autoReturnTimer) clearTimeout(autoReturnTimer);
            autoReturnTimer = setTimeout(() => {
                if (!isAutoFollowing) {
                    isAutoFollowing = true; locateBtn.classList.add('active-follow'); locateBtn.innerText = "🎯 실시간 추적 중";
                    if (targetLat !== null && targetLng !== null) map.panTo(new kakao.maps.LatLng(targetLat, targetLng));
                }
            }, 5000); 
        }

        // 💡 [수정] 줌 변경 이벤트에 핀 스케일링 로직 추가
        kakao.maps.event.addListener(map, 'zoom_changed', () => { 
            updateLineWeight(); 
            updatePinScale(); // 핀 크기 동기화
            if (!isAutoFollowing) startAutoReturnTimer(); 
        });
        
        kakao.maps.event.addListener(map, 'dragstart', () => {
            isAutoFollowing = false; locateBtn.classList.remove('active-follow'); locateBtn.innerText = "📍 수동 탐색 (5초 후 복귀)";
            if (autoReturnTimer) clearTimeout(autoReturnTimer);
        });
        kakao.maps.event.addListener(map, 'dragend', () => startAutoReturnTimer());

        locateBtn.addEventListener('click', function() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(res => { if (res === 'granted') window.addEventListener('deviceorientation', handleOrientation); });
            } else window.addEventListener('deviceorientationabsolute', handleOrientation, true);
            requestWakeLock();
            if (autoReturnTimer) clearTimeout(autoReturnTimer); 
            isAutoFollowing = true; this.classList.add('active-follow'); this.innerText = "🎯 실시간 추적 중";
            if (targetLat !== null && targetLng !== null) map.panTo(new kakao.maps.LatLng(targetLat, targetLng));
        });

        function handleOrientation(event) {
            let heading = event.webkitCompassHeading || (360 - event.alpha);
            if (heading && userMarker && movementBearing === null) userMarker.setContent(getArrowHTML(heading));
        }
        window.addEventListener('deviceorientationabsolute', handleOrientation, true);

        function getArrowHTML(heading) {
            return `<div style="width: 32px; height: 32px; transform: rotate(${heading || 0}deg); transform-origin: center center;">
                        <svg viewBox="0 0 100 100" style="width: 100%; height: 100%; filter: drop-shadow(0px 2px 3px rgba(0,0,0,0.4));">
                            <polygon points="50,10 90,90 50,70 10,90" fill="#4285F4" stroke="white" stroke-width="4"/>
                        </svg></div>`;
        }

        function smoothAnimate() {
            if (targetLat !== null && userMarker) {
                if (currentDisplayLat === null) { currentDisplayLat = targetLat; currentDisplayLng = targetLng; }
                const now = Date.now(); const timeSinceLastGps = now - lastGpsTime;
                if (timeSinceLastGps > 1000 && currentSpeedMs > 0.5) {
                    const moveDist = currentSpeedMs * (16.6 / 1000); 
                    const currentHeading = lastHeading !== null ? lastHeading : (movementBearing || 0);
                    const predicted = turf.destination(turf.point([targetLng, targetLat]), moveDist, currentHeading, {units: 'meters'});
                    targetLng = predicted.geometry.coordinates[0]; targetLat = predicted.geometry.coordinates[1];
                }
                currentDisplayLat += (targetLat - currentDisplayLat) * 0.1; currentDisplayLng += (targetLng - currentDisplayLng) * 0.1;
                userMarker.setPosition(new kakao.maps.LatLng(currentDisplayLat, currentDisplayLng));
            }
            requestAnimationFrame(smoothAnimate);
        }

        function startTracking() {
            if (!navigator.geolocation) return;
            requestWakeLock(); 
            
            navigator.geolocation.watchPosition((pos) => {
                const { latitude: rawLat, longitude: rawLng, speed, accuracy, heading } = pos.coords;
                const kmh = ((speed || 0) * 3.6).toFixed(1);
                speedPanel.innerText = `${kmh} km/h`;
                
                currentSpeedMs = speed || 0; lastGpsTime = Date.now();
                
                gpsDot.className = accuracy < 15 ? "status-good" : (accuracy < 40 ? "status-normal" : "status-bad");
                gpsText.innerText = `GPS ${accuracy < 15 ? '양호' : (accuracy < 40 ? '보통' : '불량')} (${accuracy.toFixed(1)}m)`;
                gpsText.style.color = accuracy < 15 ? "#00c853" : (accuracy < 40 ? "#ffab00" : "#ff1744");

                if (heading !== null && !isNaN(heading) && speed > 0.5) lastHeading = heading;

                let fLat = rawLat, fLng = rawLng;
                const now = Date.now();

                if (lastValidPos && lastValidTime) {
                    const dt = (now - lastValidTime) / 1000;
                    if (dt > 0) {
                        const distJump = turf.distance(turf.point([lastValidPos.lng, lastValidPos.lat]), turf.point([rawLng, rawLat]), {units: 'meters'});
                        if (distJump / dt > 25 && accuracy > 10) {
                            fLat = lastValidPos.lat * 0.8 + rawLat * 0.2; fLng = lastValidPos.lng * 0.8 + rawLng * 0.2;
                        } else {
                            fLat = lastValidPos.lat * 0.2 + rawLat * 0.8; fLng = lastValidPos.lng * 0.2 + rawLng * 0.8;
                        }
                    }
                }
                lastValidPos = { lat: fLat, lng: fLng }; lastValidTime = now;

                const activeSegments = loadedRoutes.filter(r => r.visible).flatMap(r => r.segments);
                if (activeSegments.length > 0) {
                    const userPoint = turf.point([fLng, fLat]); 
                    let baseThreshold = currentSpeedMs > 8.3 ? 20 : (currentSpeedMs > 4.1 ? 15 : 10);
                    const snapThreshold = Math.min(25, Math.max(baseThreshold, accuracy * 0.6));
                    
                    let minDWithout = Infinity, minDWith = Infinity;
                    let bestSWithout = null, bestS = null;

                    for (const s of activeSegments) {
                        let d = turf.pointToLineDistance(userPoint, s, {units: 'meters'});
                        if (d < minDWithout) { minDWithout = d; bestSWithout = s; }
                        if (d <= snapThreshold) {
                            let penaltyDist = d;
                            if (lastHeading !== null) {
                                const p1 = s.geometry.coordinates[0], p2 = s.geometry.coordinates[1];
                                const sH = turf.bearing(p1, p2) < 0 ? turf.bearing(p1, p2) + 360 : turf.bearing(p1, p2);
                                let hD = Math.abs(lastHeading - sH) % 360; hD = hD > 180 ? 360 - hD : hD;
                                if (hD <= 90 && penaltyDist < minDWith) { minDWith = penaltyDist; bestS = s; }
                            }
                        }
                    }

                    if (minDWithout > 25) offRouteWarning.style.display = 'block';
                    else offRouteWarning.style.display = 'none';

                    const targetSegment = bestS || (minDWithout <= snapThreshold ? bestSWithout : null);
                    if (targetSegment) {
                        const snapped = turf.nearestPointOnLine(targetSegment, userPoint);
                        fLat = snapped.geometry.coordinates[1]; fLng = snapped.geometry.coordinates[0];
                    }
                }

                if (passedPathCoordinates.length === 0) {
                    passedPathCoordinates.push(new kakao.maps.LatLng(fLat, fLng));
                    if(passedPolyline) passedPolyline.setPath(passedPathCoordinates);
                    lastPathTime = now;
                } else {
                    const lastPoint = passedPathCoordinates[passedPathCoordinates.length-1];
                    const distFromLast = turf.distance(turf.point([fLng, fLat]), turf.point([lastPoint.getLng(), lastPoint.getLat()]), {units: 'meters'});
                    
                    let timeSinceLastPath = (now - lastPathTime) / 1000; if (timeSinceLastPath <= 0) timeSinceLastPath = 1; 
                    if (distFromLast > 1 && (distFromLast / timeSinceLastPath) < 40) {
                        passedPathCoordinates.push(new kakao.maps.LatLng(fLat, fLng));
                        if(passedPolyline) passedPolyline.setPath(passedPathCoordinates);
                        lastPathTime = now; 
                        
                        totalPassedLengthMeters += distFromLast; 
                        updateProgressUI();
                    }
                }

                targetLat = fLat; targetLng = fLng;

                if (prevFinalLat) {
                    if (turf.distance(turf.point([prevFinalLng, prevFinalLat]), turf.point([fLng, fLat]), {units: 'meters'}) > 1) {
                        movementBearing = (turf.bearing(turf.point([prevFinalLng, prevFinalLat]), turf.point([fLng, fLat])) + 360) % 360;
                        prevFinalLat = fLat; prevFinalLng = fLng;
                    }
                } else { prevFinalLat = fLat; prevFinalLng = fLng; }

                const aH = movementBearing !== null ? movementBearing : (lastHeading || 0);

                if (!userMarker) {
                    userMarker = new kakao.maps.CustomOverlay({ position: new kakao.maps.LatLng(fLat, fLng), content: getArrowHTML(aH), xAnchor: 0.5, yAnchor: 0.5 });
                    userMarker.setMap(map); smoothAnimate();
                } else { userMarker.setContent(getArrowHTML(aH)); }
                
                if (isAutoFollowing) map.panTo(new kakao.maps.LatLng(fLat, fLng));

            }, (err) => {
                gpsText.innerText = "GPS 신호 끊김 (탐색 중)"; gpsText.style.color = "#ff1744"; gpsDot.className = "status-bad"; speedPanel.innerText = "-.- km/h";
                if (autoReturnTimer) clearTimeout(autoReturnTimer); locateBtn.classList.remove('active-follow'); locateBtn.innerText = "📍 위치 신호 대기중"; isAutoFollowing = false;
            }, { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 });
        }

        window.onload = () => {
            loadFromLocalStorage(); 
            startTracking();
            setInterval(saveToLocalStorage, 3000); 
        };
    </script>
</body>
</html>
