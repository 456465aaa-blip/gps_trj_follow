<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Ultimate Kakao Tracker (Speed-Adaptive Snap)</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=34bd25e1ff5410300affbf08cb002b43"></script>
    <script src="https://unpkg.com/@turf/turf/turf.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; overflow: hidden; background: #f0f0f0; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        #controls {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(255, 255, 255, 0.98);
            padding: 15px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            text-align: center; width: 280px; border: 1px solid #ddd;
        }
        #speed-panel { font-size: 36px; font-weight: 900; color: #000; margin-bottom: 5px; letter-spacing: -1px; }
        #gps-status-container { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px; font-size: 14px; font-weight: 700; }
        #gps-dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; }
        .status-good { background: #00c853 !important; box-shadow: 0 0 10px #00c853; }
        .status-normal { background: #ffab00 !important; box-shadow: 0 0 10px #ffab00; }
        .status-bad { background: #ff1744 !important; box-shadow: 0 0 10px #ff1744; }
        input[type="file"] { width: 100%; font-size: 12px; color: #666; }
        #locate-btn {
            position: absolute; bottom: 40px; right: 20px; z-index: 1000;
            background: white; border: none; border-radius: 50px;
            padding: 16px 24px; font-size: 16px; font-weight: 800; color: #4285F4;
            cursor: pointer; box-shadow: 0 6px 20px rgba(0,0,0,0.25);
            display: flex; align-items: center; gap: 8px;
        }
        .active-follow { background: #4285F4 !important; color: white !important; }
    </style>
</head>
<body>

    <div id="controls">
        <div id="speed-panel">0.0 km/h</div>
        <div id="gps-status-container">
            <div id="gps-dot"></div>
            <span id="gps-text">지도 로딩 중...</span>
        </div>
        <input type="file" id="geojson-input" accept=".geojson, .json">
    </div>

    <button id="locate-btn" class="active-follow">🎯 실시간 추적 중</button>
    <div id="map"></div>

    <script>
        const container = document.getElementById('map');
        const options = { center: new kakao.maps.LatLng(37.5665, 126.9780), level: 3 };
        const map = new kakao.maps.Map(container, options);

        let currentRouteGeoJSON = null; 
        let routeSegments = []; 
        let baseRouteLayer = null;       
        let passedPolyline = null;       
        let userMarker = null;           
        let trackingWatchId = null;
        let passedPathCoordinates = [];  
        let isAutoFollowing = true; 
        let lastHeading = null; 
        let targetLat = null, targetLng = null;
        let currentDisplayLat = null, currentDisplayLng = null;
        let movementBearing = null;
        let prevFinalLat = null, prevFinalLng = null;
        let lastSelectedSegmentId = null;

        const gpsDot = document.getElementById('gps-dot');
        const gpsText = document.getElementById('gps-text');
        const speedPanel = document.getElementById('speed-panel');
        const locateBtn = document.getElementById('locate-btn');

        // 줌 레벨에 따른 선 두께 조절
        function getDynamicWeight() {
            const level = map.getLevel();
            if (level <= 1) return 16;
            if (level === 2) return 12;
            if (level === 3) return 8;
            if (level === 4) return 5;
            return 3;
        }

        function updateLineWeight() {
            const dynamicWeight = getDynamicWeight();
            if (baseRouteLayer) baseRouteLayer.setOptions({ strokeWeight: dynamicWeight });
            if (passedPolyline) passedPolyline.setOptions({ strokeWeight: dynamicWeight });
        }

        kakao.maps.event.addListener(map, 'zoom_changed', updateLineWeight);
        
        kakao.maps.event.addListener(map, 'dragstart', () => {
            isAutoFollowing = false;
            locateBtn.classList.remove('active-follow');
            locateBtn.innerText = "📍 수동 탐색 모드";
        });

        // 아이폰 방향 권한 및 현재 위치 고정 버튼
        locateBtn.addEventListener('click', function() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(response => {
                    if (response === 'granted') window.addEventListener('deviceorientation', handleOrientation);
                }).catch(console.error);
            } else {
                window.addEventListener('deviceorientationabsolute', handleOrientation, true);
            }
            
            isAutoFollowing = true;
            this.classList.add('active-follow');
            this.innerText = "🎯 실시간 추적 중";
            if (targetLat !== null && targetLng !== null) {
                map.panTo(new kakao.maps.LatLng(targetLat, targetLng));
            }
        });

        // 파일 업로드 처리 (원본 그대로 렌더링)
        document.getElementById('geojson-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (baseRouteLayer) baseRouteLayer.setMap(null);
                    if (passedPolyline) passedPolyline.setMap(null);
                    processGeoJSON(data);
                } catch (err) { 
                    alert('GeoJSON 파싱 오류가 발생했습니다.'); 
                }
            };
            reader.readAsText(file);
        });

        // GeoJSON 렌더링 함수
        function processGeoJSON(data) {
            currentRouteGeoJSON = data;
            passedPathCoordinates = []; 
            routeSegments = [];
            let kakaoPaths = [];
            let bounds = new kakao.maps.LatLngBounds();

            try {
                let segmentId = 0;
                turf.segmentEach(data, (currentSegment) => {
                    currentSegment.segmentId = segmentId++;
                    routeSegments.push(currentSegment);
                });
                
                turf.coordEach(data, (c) => {
                    const latLng = new kakao.maps.LatLng(c[1], c[0]);
                    kakaoPaths.push(latLng);
                    bounds.extend(latLng);
                });
            } catch(e) { console.error("데이터 변환 오류", e); }

            const initialWeight = getDynamicWeight();
            
            // 붉은색 원본 경로 생성
            baseRouteLayer = new kakao.maps.Polyline({
                path: kakaoPaths, strokeWeight: initialWeight, strokeColor: '#FF3B30', strokeOpacity: 1.0, strokeStyle: 'solid'
            });
            baseRouteLayer.setMap(map);
            
            // 회색 지나간 경로 생성
            passedPolyline = new kakao.maps.Polyline({
                path: [], strokeWeight: initialWeight, strokeColor: '#8E8E93', strokeOpacity: 1.0, strokeStyle: 'solid'
            });
            passedPolyline.setMap(map);
            
            map.setBounds(bounds);
        }

        // 나침반 방향 처리 함수
        function handleOrientation(event) {
            let heading = event.webkitCompassHeading || (360 - event.alpha);
            if (heading && userMarker && movementBearing === null) {
                userMarker.setContent(getArrowHTML(heading));
            }
        }
        window.addEventListener('deviceorientationabsolute', handleOrientation, true);

        function getSegmentHeadingDiff(heading1, heading2) {
            let diff = Math.abs(heading1 - heading2) % 360;
            if (diff > 180) diff = 360 - diff;
            return diff;
        }

        // 화살표 UI 생성 함수
        function getArrowHTML(heading) {
            return `
                <div class="arrow-container" style="width: 32px; height: 32px; transform: rotate(${heading || 0}deg); transform-origin: center center;">
                    <svg viewBox="0 0 100 100" style="width: 100%; height: 100%; filter: drop-shadow(0px 2px 3px rgba(0,0,0,0.4));">
                        <polygon points="50,10 90,90 50,70 10,90" fill="#4285F4" stroke="white" stroke-width="4"/>
                    </svg>
                </div>`;
        }

        // 60fps 부드러운 애니메이션
        function smoothAnimate() {
            if (targetLat !== null && userMarker) {
                if (currentDisplayLat === null) { currentDisplayLat = targetLat; currentDisplayLng = targetLng; }
                currentDisplayLat += (targetLat - currentDisplayLat) * 0.1;
                currentDisplayLng += (targetLng - currentDisplayLng) * 0.1;
                userMarker.setPosition(new kakao.maps.LatLng(currentDisplayLat, currentDisplayLng));
            }
            requestAnimationFrame(smoothAnimate);
        }

        // 실시간 추적 메인 로직
        function startTracking() {
            if (!navigator.geolocation) return;
            
            trackingWatchId = navigator.geolocation.watchPosition((pos) => {
                const { latitude: lat, longitude: lng, speed, accuracy, heading } = pos.coords;
                const kmh = ((speed || 0) * 3.6).toFixed(1);
                speedPanel.innerText = `${kmh} km/h`;
                
                gpsDot.className = accuracy < 15 ? "status-good" : (accuracy < 40 ? "status-normal" : "status-bad");
                gpsText.innerText = `GPS ${accuracy < 15 ? '양호' : (accuracy < 40 ? '보통' : '불량')} (${accuracy.toFixed(1)}m)`;

                // 1.8km/h 이상일 때만 방향각 업데이트
                if (heading !== null && !isNaN(heading) && speed > 0.5) lastHeading = heading;

                let fLat = lat, fLng = lng;

                if (routeSegments.length > 0) {
                    const userPoint = turf.point([lng, lat]);
                    
                    // 💡 [핵심] 속도에 비례하는 다이내믹 스냅 반경 계산
                    let currentSpeed = speed || 0;
                    let baseThreshold = 15; // 기본 (골목길/저속)

                    if (currentSpeed > 8.3) { 
                        baseThreshold = 35; // 30km/h 이상 (대형 도로)
                    } else if (currentSpeed > 4.1) { 
                        baseThreshold = 25; // 15~30km/h (중형 도로)
                    } else { 
                        baseThreshold = 15; // 15km/h 이하 (골목길 방지)
                    }

                    // GPS 오차를 반영하되, 최대 40m 상한선 적용
                    const snapThreshold = Math.min(40, Math.max(baseThreshold, accuracy * 0.8));
                    
                    let minDWithout = Infinity, minDWith = Infinity;
                    let bestSWithout = null, bestS = null;

                    for (const s of routeSegments) {
                        let d = turf.pointToLineDistance(userPoint, s, {units: 'meters'});
                        
                        if (d <= snapThreshold) {
                            // Sticky Snap (교차로 튐 방지 페널티 20m)
                            let penaltyDist = d;
                            if (lastSelectedSegmentId !== null && s.segmentId !== lastSelectedSegmentId) {
                                penaltyDist += 20; 
                            }
                            
                            if (penaltyDist < minDWithout) { 
                                minDWithout = penaltyDist; 
                                bestSWithout = s; 
                            }

                            // 상하행 일치 판단
                            if (lastHeading !== null) {
                                const p1 = s.geometry.coordinates[0], p2 = s.geometry.coordinates[1];
                                const sB = turf.bearing(p1, p2);
                                const sH = sB < 0 ? sB + 360 : sB;
                                const hD = getSegmentHeadingDiff(lastHeading, sH);
                                
                                if (hD <= 90 && penaltyDist < minDWith) { 
                                    minDWith = penaltyDist; 
                                    bestS = s; 
                                }
                            }
                        }
                    }

                    const targetSegment = bestS || bestSWithout;
                    if (targetSegment) {
                        lastSelectedSegmentId = targetSegment.segmentId;
                        const snapped = turf.nearestPointOnLine(targetSegment, userPoint);
                        fLat = snapped.geometry.coordinates[1]; 
                        fLng = snapped.geometry.coordinates[0];
                        
                        // 회색 칠하기 덧씌움
                        if (passedPathCoordinates.length === 0 || 
                            turf.distance(turf.point([fLng, fLat]), turf.point([passedPathCoordinates[passedPathCoordinates.length-1].getLng(), passedPathCoordinates[passedPathCoordinates.length-1].getLat()]), {units: 'meters'}) > 1) {
                            passedPathCoordinates.push(new kakao.maps.LatLng(fLat, fLng));
                            passedPolyline.setPath(passedPathCoordinates);
                        }
                    }
                }

                targetLat = fLat; targetLng = fLng;

                // 이동 궤적을 통한 실제 방향(Bearing) 계산
                if (prevFinalLat) {
                    const dm = turf.distance(turf.point([prevFinalLng, prevFinalLat]), turf.point([fLng, fLat]), {units: 'meters'});
                    if (dm > 1) {
                        movementBearing = (turf.bearing(turf.point([prevFinalLng, prevFinalLat]), turf.point([fLng, fLat])) + 360) % 360;
                        prevFinalLat = fLat; prevFinalLng = fLng;
                    }
                } else { prevFinalLat = fLat; prevFinalLng = fLng; }

                const aH = movementBearing !== null ? movementBearing : (lastHeading || 0);

                // 마커 오버레이 업데이트
                if (!userMarker) {
                    userMarker = new kakao.maps.CustomOverlay({ position: new kakao.maps.LatLng(fLat, fLng), content: getArrowHTML(aH), xAnchor: 0.5, yAnchor: 0.5 });
                    userMarker.setMap(map); smoothAnimate();
                } else { userMarker.setContent(getArrowHTML(aH)); }
                
                // 카메라 자동 추적
                if (isAutoFollowing) map.panTo(new kakao.maps.LatLng(fLat, fLng));

            }, null, { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 });
        }

        window.onload = startTracking;
    </script>
</body>
</html>
